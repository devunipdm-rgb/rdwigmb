<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disparador WhatsApp - RDW IGMB</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            color: #333;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .header p {
            color: #666;
            font-size: 14px;
        }

        .status-badge {
            display: inline-block;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-top: 10px;
            text-transform: uppercase;
        }

        .status-badge.disconnected {
            background-color: #fee;
            color: #c33;
        }

        .status-badge.connected {
            background-color: #efe;
            color: #3c3;
        }

        .status-info {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #666;
        }

        .qrcode-section {
            display: none;
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 30px;
            border-bottom: 2px solid #eee;
        }

        .qrcode-section.active {
            display: block;
        }

        .qrcode-section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }

        .qrcode-container {
            background: white;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #ddd;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
            margin-bottom: 15px;
        }

        .qrcode-container img {
            max-width: 250px;
            max-height: 250px;
        }

        .qrcode-placeholder {
            color: #999;
            text-align: center;
        }

        .loading-spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 8px;
            font-size: 14px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 100px;
            max-height: 200px;
        }

        .form-group input:disabled,
        .form-group textarea:disabled {
            background-color: #f5f5f5;
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn-send {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-send:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-send:disabled {
            background: #ccc;
            cursor: not-allowed;
            opacity: 0.6;
        }

        .btn-refresh {
            background: #f0f0f0;
            color: #333;
            flex: 0.3;
        }

        .btn-refresh:hover {
            background: #e0e0e0;
        }

        .alert {
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .alert.active {
            display: block;
        }

        .alert.success {
            background-color: #efe;
            border: 2px solid #3c3;
            color: #030;
        }

        .alert.error {
            background-color: #fee;
            border: 2px solid #c33;
            color: #300;
        }

        .alert.info {
            background-color: #eef;
            border: 2px solid #33c;
            color: #003;
        }

        .counter {
            display: inline-block;
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }

        .contact-preview {
            display: inline-block;
            background: #f0f0f0;
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 12px;
            margin-top: 5px;
            color: #666;
        }

        .refresh-info {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
            text-align: center;
        }

        .spinner-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .server-info {
            background: linear-gradient(135deg, #e8f5e9 0%, #c8e6c9 100%);
            border: 2px solid #4caf50;
            color: #2e7d32;
            padding: 12px;
            border-radius: 8px;
            font-size: 13px;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 600;
        }

        /* Abas de navegação */
        .tabs-nav {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px 15px;
            border: none;
            background: #f5f5f5;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            background: #e0e0e0;
        }

        .tab-btn.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        /* Seções de conteúdo */
        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Tabela de histórico */
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 13px;
        }

        .history-table th,
        .history-table td {
            padding: 10px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        .history-table th {
            background: #f5f5f5;
            font-weight: 600;
            color: #333;
        }

        .history-table tr:hover {
            background: #f9f9f9;
        }

        .status-sucesso {
            color: #4caf50;
            font-weight: bold;
        }

        .status-falha {
            color: #f44336;
            font-weight: bold;
        }

        .history-empty {
            text-align: center;
            padding: 30px;
            color: #999;
        }

        .btn-refresh-history {
            background: #f0f0f0;
            color: #333;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 12px;
            margin-bottom: 15px;
        }

        .btn-refresh-history:hover {
            background: #e0e0e0;
        }

        /* Botão de Logout */
        .btn-logout {
            background: linear-gradient(135deg, #ff6b6b 0%, #ee5a5a 100%);
            color: white;
            padding: 8px 16px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            margin-left: 10px;
            transition: all 0.3s;
        }

        .btn-logout:hover {
            background: linear-gradient(135deg, #ff5252 0%, #d32f2f 100%);
            transform: translateY(-1px);
        }

        .btn-logout:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .header-actions {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-top: 10px;
            gap: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>📱 Disparador WhatsApp</h1>
            <p>RDW IGMB - Baileys & Firebase</p>
            <div class="server-info">
                🌐 Servidor: rdwigmb.squareweb.app (Square Cloud Direto)
            </div>
            <div class="status-badge disconnected" id="statusBadge">
                <span class="loading-spinner"></span>
                Verificando...
            </div>
            <div class="header-actions" id="headerActions" style="display: none;">
                <button type="button" class="btn-logout" id="logoutBtn" title="Desconectar WhatsApp">
                    🚪 Sair
                </button>
            </div>
        </div>

        <!-- Status Info -->
        <div class="status-info" id="statusInfo">
            <strong>Status:</strong> <span id="statusText">Carregando...</span> <br>
            <strong>Número:</strong> <span id="numberText">-</span>
        </div>

        <!-- Alert Messages -->
        <div class="alert" id="alertBox"></div>

        <!-- QR Code Section -->
        <div class="qrcode-section" id="qrcodeSection">
            <h2>Escaneie o Código QR</h2>
            <p style="color: #666; font-size: 13px; margin-bottom: 15px;">
                Use seu celular para fotografar o código abaixo
            </p>
            <div class="qrcode-container">
                <div class="qrcode-placeholder" id="qrcodeContainer">
                    <div class="spinner-text">
                        <span class="loading-spinner"></span>
                        Gerando QR Code...
                    </div>
                </div>
            </div>
            <div class="refresh-info" id="refreshInfo"></div>
        </div>

        <!-- Abas de Navegação -->
        <div class="tabs-nav" id="tabsNav" style="display: none;">
            <button type="button" class="tab-btn active" data-tab="enviar">📤 Enviar</button>
            <button type="button" class="tab-btn" data-tab="historico">📜 Histórico</button>
        </div>

        <!-- Tab Enviar -->
        <div class="tab-content active" id="tabEnviar">
            <!-- Form Section -->
            <div class="form-section" id="formSection">
                <form id="messageForm">
                    <div class="form-group">
                        <label for="phoneNumber">
                            📱 Número de WhatsApp
                            <span class="counter" id="charCounter">0</span>
                        </label>
                        <input 
                            type="tel" 
                            id="phoneNumber" 
                            placeholder="Ex: 34998713466 (sem +55)" 
                            required
                            pattern="[0-9]+"
                            maxlength="20"
                        >
                        <div class="contact-preview" id="phonePreview" style="display: none;"></div>
                    </div>

                    <div class="form-group">
                        <label for="message">
                            ✉️ Mensagem
                            <span class="counter" id="msgCounter">0</span>
                        </label>
                        <textarea 
                            id="message" 
                            placeholder="Digite sua mensagem aqui..." 
                            required
                            maxlength="1000"
                        ></textarea>
                    </div>

                    <div class="button-group">
                        <button type="submit" class="btn-send" id="sendBtn">
                            Enviar Mensagem
                        </button>
                        <button type="button" class="btn-refresh" id="refreshBtn" title="Atualizar Status">
                            🔄
                        </button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Tab Histórico -->
        <div class="tab-content" id="tabHistorico">
            <div class="form-section" id="historySection" style="display: block;">
                <h3 style="margin-bottom: 15px; color: #333;">📜 Histórico de Envios</h3>
                <button type="button" class="btn-refresh-history" id="refreshHistoryBtn">
                    🔄 Atualizar
                </button>
                <div id="historyContainer">
                    <div class="history-empty">Carregando histórico...</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://rdwigmb.squareweb.app'; // Square Cloud direto
        let isConnected = false;
        let checkStatusInterval;
        let isSending = false; // Bloqueio para evitar cliques duplos

        const statusBadge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        const numberText = document.getElementById('numberText');
        const alertBox = document.getElementById('alertBox');
        const qrcodeSection = document.getElementById('qrcodeSection');
        const qrcodeContainer = document.getElementById('qrcodeContainer');
        const formSection = document.getElementById('formSection');
        const messageForm = document.getElementById('messageForm');
        const phoneInput = document.getElementById('phoneNumber');
        const messageInput = document.getElementById('message');
        const sendBtn = document.getElementById('sendBtn');
        const refreshBtn = document.getElementById('refreshBtn');
        const charCounter = document.getElementById('charCounter');
        const msgCounter = document.getElementById('msgCounter');
        const phonePreview = document.getElementById('phonePreview');
        const refreshInfo = document.getElementById('refreshInfo');
        const tabsNav = document.getElementById('tabsNav');
        const tabBtns = document.querySelectorAll('.tab-btn');
        const tabContents = document.querySelectorAll('.tab-content');
        const historyContainer = document.getElementById('historyContainer');
        const refreshHistoryBtn = document.getElementById('refreshHistoryBtn');
        const headerActions = document.getElementById('headerActions');
        const logoutBtn = document.getElementById('logoutBtn');

        document.addEventListener('DOMContentLoaded', () => {
            checkStatus().then(() => {
                // Se não conectado, carregar QR code imediatamente
                if (!isConnected) {
                    loadQRCode();
                }
            });
            checkStatusInterval = setInterval(checkStatus, 3000);
            messageForm.addEventListener('submit', handleSendMessage);
            refreshBtn.addEventListener('click', (e) => {
                e.preventDefault();
                checkStatus();
            });
            phoneInput.addEventListener('input', updatePhonePreview);
            charCounter.textContent = phoneInput.value.length;
            msgCounter.textContent = messageInput.value.length;
            phoneInput.addEventListener('input', () => {
                charCounter.textContent = phoneInput.value.length;
            });
            messageInput.addEventListener('input', () => {
                msgCounter.textContent = messageInput.value.length;
            });

            // Event listeners para abas
            tabBtns.forEach(btn => {
                btn.addEventListener('click', () => switchTab(btn.dataset.tab));
            });

            // Event listener para atualizar histórico
            refreshHistoryBtn.addEventListener('click', loadHistory);

            // Event listener para logout
            logoutBtn.addEventListener('click', handleLogout);
        });

        async function checkStatus() {
            try {
                const response = await fetch(`${API_BASE}/status`, {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    mode: 'cors',
                    credentials: 'omit'
                });
                const data = await response.json();

                isConnected = data.conectado;
                const numero = data.numero ? data.numero.replace('@s.whatsapp.net', '') : '-';

                updateStatusUI(isConnected, numero, data.processando);
                updateFormVisibility();

                if (!isConnected) {
                    loadQRCode();
                }
            } catch (error) {
                console.error('Erro ao verificar status:', error);
                isConnected = false;
                statusText.textContent = 'Erro de conexão com servidor';
                statusBadge.className = 'status-badge disconnected';
                updateFormVisibility();
                showAlert('⚠️ Erro ao conectar com o servidor. Verifique se o servidor está online.', 'error');
            }
        }

        function updateStatusUI(connected, numero, processando) {
            if (connected) {
                statusBadge.className = 'status-badge connected';
                statusBadge.innerHTML = '✅ Conectado';
                statusText.textContent = 'WhatsApp Conectado';
                numberText.textContent = numero;
            } else {
                statusBadge.className = 'status-badge disconnected';
                statusBadge.innerHTML = '<span class="loading-spinner"></span> Aguardando QR Code';
                statusText.textContent = 'Aguardando autenticação via QR Code';
                numberText.textContent = '-';
            }

            if (processando) {
                sendBtn.disabled = true;
                sendBtn.textContent = 'Enviando...';
            } else {
                sendBtn.disabled = !connected;
                sendBtn.textContent = 'Enviar Mensagem';
            }
        }

        async function loadQRCode() {
            try {
                const response = await fetch(`${API_BASE}/qrcode`);
                const data = await response.json();

                if (data.conectado) {
                    qrcodeSection.classList.remove('active');
                    return;
                }

                if (data.qrcode) {
                    qrcodeSection.classList.add('active');
                    qrcodeContainer.innerHTML = `<img src="${data.qrcode}" alt="QR Code">`;
                    refreshInfo.textContent = 'QR Code atualizado. Scan com seu celular.';
                } else if (data.error) {
                    qrcodeContainer.innerHTML = `<div class="qrcode-placeholder">${data.error}</div>`;
                }

                setTimeout(loadQRCode, 30000);
            } catch (error) {
                console.error('Erro ao carregar QR Code:', error);
                qrcodeContainer.innerHTML = '<div class="qrcode-placeholder">⚠️ Erro ao carregar QR Code</div>';
            }
        }

        function updateFormVisibility() {
            if (isConnected) {
                formSection.classList.add('active');
                qrcodeSection.classList.remove('active');
                tabsNav.style.display = 'flex';
                headerActions.style.display = 'flex';
                phoneInput.disabled = false;
                messageInput.disabled = false;
            } else {
                formSection.classList.remove('active');
                tabsNav.style.display = 'none';
                headerActions.style.display = 'none';
                phoneInput.disabled = true;
                messageInput.disabled = true;
            }
        }

        async function handleLogout() {
            if (!confirm('Tem certeza que deseja desconectar o WhatsApp?\n\nVocê precisará escanear o QR Code novamente para reconectar.')) {
                return;
            }

            logoutBtn.disabled = true;
            logoutBtn.innerHTML = '🔄 Saindo...';

            try {
                const response = await fetch(`${API_BASE}/logout`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    mode: 'cors'
                });

                const data = await response.json();

                if (data.success) {
                    showAlert('👋 WhatsApp desconectado com sucesso!', 'success');
                    isConnected = false;
                    updateFormVisibility();
                    // Carregar QR code imediatamente após desconectar
                    loadQRCode();
                } else {
                    showAlert(`❌ Erro: ${data.error || 'Não foi possível desconectar'}`, 'error');
                }
            } catch (error) {
                console.error('Erro ao fazer logout:', error);
                showAlert('❌ Erro ao desconectar. Tente novamente.', 'error');
            } finally {
                logoutBtn.disabled = false;
                logoutBtn.innerHTML = '🚪 Sair';
            }
        }

        function switchTab(tabName) {
            tabBtns.forEach(btn => {
                btn.classList.toggle('active', btn.dataset.tab === tabName);
            });
            tabContents.forEach(content => {
                content.classList.toggle('active', content.id === `tab${tabName.charAt(0).toUpperCase() + tabName.slice(1)}`);
            });
        }

        async function loadHistory() {
            try {
                historyContainer.innerHTML = '<div class="history-empty">Carregando histórico...</div>';
                const response = await fetch(`${API_BASE}/historico`);
                const data = await response.json();

                if (!data.success || data.registros.length === 0) {
                    historyContainer.innerHTML = '<div class="history-empty">Nenhum registro encontrado</div>';
                    return;
                }

                const table = document.createElement('table');
                table.className = 'history-table';
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th>Data</th>
                            <th>Contato</th>
                            <th>Campanha</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${data.registros.map(reg => `
                            <tr>
                                <td>${reg.data ? new Date(reg.data).toLocaleString('pt-BR') : '-'}</td>
                                <td>${reg.contato}</td>
                                <td>${reg.campanhaId}</td>
                                <td class="status-${reg.status}">${reg.status === 'sucesso' ? '✅ Sucesso' : '❌ Falha'}</td>
                            </tr>
                        `).join('')}
                    </tbody>
                `;
                historyContainer.innerHTML = '';
                historyContainer.appendChild(table);
            } catch (error) {
                console.error('Erro ao carregar histórico:', error);
                historyContainer.innerHTML = '<div class="history-empty">Erro ao carregar histórico</div>';
            }
        }

        function updatePhonePreview() {
            if (phoneInput.value.trim()) {
                let numero = phoneInput.value.trim().replace(/\D/g, '');
                if (!numero.startsWith('55')) {
                    numero = '55' + numero;
                }
                phonePreview.textContent = `📞 +${numero}`;
                phonePreview.style.display = 'inline-block';
            } else {
                phonePreview.style.display = 'none';
            }
        }

        async function handleSendMessage(e) {
            e.preventDefault();

            // Bloquear se já estiver enviando
            if (isSending) {
                showAlert('⏳ Aguarde, mensagem já está sendo enviada...', 'error');
                return;
            }

            isSending = true;

            let phone = phoneInput.value.trim();
            const message = messageInput.value.trim();

            if (!phone) {
                showAlert('❌ Por favor, insira um número de WhatsApp', 'error');
                phoneInput.focus();
                return;
            }

            if (!message) {
                showAlert('❌ Por favor, insira uma mensagem', 'error');
                messageInput.focus();
                return;
            }

            phone = phone.replace(/\D/g, '');

            if (!phone.startsWith('55')) {
                phone = '55' + phone;
            }

            if (phone.length < 12 || phone.length > 13) {
                showAlert('❌ O número deve ter 11-12 dígitos (sem contar o código de país)', 'error');
                phoneInput.focus();
                return;
            }

            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner-text"><span class="loading-spinner"></span>Enviando...</span>';

            try {
                const response = await fetch(`${API_BASE}/disparar`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        campanhaId: `web_${Date.now()}`,
                        contatos: [phone],
                        mensagem: message
                    })
                });

                const data = await response.json();

                if (response.ok) {
                    showAlert(`✅ ${data.message}\n\n📊 Contatos: ${data.contatoCount}\n💡 ${data.info}`, 'success');
                    messageForm.reset();
                    charCounter.textContent = '0';
                    msgCounter.textContent = '0';
                    phonePreview.style.display = 'none';
                } else {
                    showAlert(`❌ Erro: ${data.error || 'Não foi possível enviar'}`, 'error');
                }
            } catch (error) {
                console.error('Erro ao enviar:', error);
                showAlert('❌ Erro ao conectar com servidor. Verifique a conexão e tente novamente.', 'error');
            } finally {
                isSending = false;
                sendBtn.disabled = !isConnected;
                sendBtn.innerHTML = 'Enviar Mensagem';
            }
        }

        function showAlert(message, type) {
            alertBox.textContent = message;
            alertBox.className = `alert ${type} active`;
            setTimeout(() => {
                alertBox.classList.remove('active');
            }, 5000);
        }

        window.addEventListener('beforeunload', () => {
            clearInterval(checkStatusInterval);
        });
    </script>
</body>
</html>
